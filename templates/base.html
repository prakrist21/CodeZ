<!DOCTYPE html>
<html data-theme="dark">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spark{% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root,
        [data-theme="dark"] {
            --page-bg: #0d0d0d;
            --sidebar-bg: #111;
            --card-bg: #111;
            --result-bg: #0d0d0d;
            --input-bg: #0d0d0d;

            --border: #2a2a2a;
            --border-light: #333;
            --border-active: #1a3d26;

            --text-primary: #00ff88;
            --text-primary-dim: #0a1f13;
            --text-blue: #58c4ff;
            --text-yellow: #ffcc00;
            --text-heading: #bbb;
            --text-muted: #aaa;
            --text-nav: #bbb;
            --text-light: #aaa;
            --text-input: #eee;
            --text-body: #e8e8e8;
            --text-value-input: #999;

            --btn-green-bg: #00ff88;
            --btn-green-text: #0d0d0d;
            --btn-blue-bg: #58c4ff;
            --btn-blue-text: #0d0d0d;

            --hover-bg: #1e1e1e;
            --active-bg: #0a1f13;
            --theme-btn-bg: #222;
            --theme-btn-border: #333;
            --theme-btn-color: #bbb;
        }

        [data-theme="light"] {
            --page-bg: #f4f4ef;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --result-bg: #fafaf5;
            --input-bg: #ffffff;

            --border: #e0ddd3;
            --border-light: #d4d1c7;
            --border-active: #a5d6a7;

            --text-primary: #1a6b3c;
            --text-primary-dim: #e8f5e9;
            --text-blue: #0066aa;
            --text-yellow: #b8860b;
            --text-heading: #888;
            --text-muted: #999;
            --text-nav: #888;
            --text-light: #555;
            --text-input: #333;
            --text-body: #444;
            --text-value-input: #999;

            --btn-green-bg: #1a6b3c;
            --btn-green-text: #ffffff;
            --btn-blue-bg: #0066aa;
            --btn-blue-text: #ffffff;

            --hover-bg: #f0eee8;
            --active-bg: #e8f5e9;
            --theme-btn-bg: #e8e6e0;
            --theme-btn-border: #d4d1c7;
            --theme-btn-color: #666;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 450;
            background: var(--page-bg);
            color: var(--text-body);
            min-height: 100vh;
            display: flex;
            transition: background 0.3s, color 0.3s;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            transition: background 0.3s;
        }

        .sidebar-top {
            flex-shrink: 0;
        }

        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .sidebar-bottom {
            flex-shrink: 0;
        }

        .sidebar-logo {
            text-align: center;
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo i {
            font-size: 32px;
            color: var(--text-primary);
        }

        .logo-img {
            max-width: 150px;
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .sidebar-logo h1 {
            font-size: 18px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text-primary);
            margin-top: 6px;
        }

        .sidebar-logo p {
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .sidebar-section {
            padding: 18px 16px 6px;
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .technique-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            margin: 1px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-nav);
            border: 1px solid transparent;
            background: transparent;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: all 0.2s;
            width: calc(100% - 16px);
            text-align: left;
        }

        .technique-btn i { font-size: 15px; }
        .technique-btn:hover { color: var(--text-body); background: var(--hover-bg); }
        .technique-btn.active {
            color: var(--text-primary);
            background: var(--active-bg);
            border-color: var(--border-active);
        }

        .sidebar-nav {
            border-top: 1px solid var(--border);
            padding: 12px 8px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            border-radius: 6px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-nav);
            text-decoration: none;
            transition: all 0.2s;
        }

        .sidebar-nav a:hover { color: var(--text-body); background: var(--hover-bg); }
        .sidebar-nav a.active { color: var(--text-primary); }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            margin: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--theme-btn-color);
            border: 1px solid var(--theme-btn-border);
            background: var(--theme-btn-bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: all 0.2s;
            width: calc(100% - 16px);
            text-align: left;
        }

        .theme-toggle:hover {
            color: var(--text-body);
            background: var(--hover-bg);
        }

        /* ── Main content ── */
        .main {
            margin-left: 220px;
            flex: 1;
            padding: 40px;
            min-height: 100vh;
            transition: background 0.3s;
        }

        .main-header {
            margin-bottom: 30px;
        }

        .main-header h2 {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-heading);
            font-weight: normal;
        }

        .main-header span {
            font-size: 18px;
            letter-spacing: 3px;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        /* ── Encode / Decode panels ── */
        .container {
            display: flex;
            gap: 24px;
        }

        .box {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 28px;
            transition: background 0.3s, border 0.3s;
        }

        .box-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .box-header i { font-size: 20px; }
        .encode-box .box-header i { color: var(--text-primary); }
        .decode-box .box-header i { color: var(--text-blue); }

        .box-header h2 {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: normal;
        }

        .encode-box .box-header h2 { color: var(--text-primary); }
        .decode-box .box-header h2 { color: var(--text-blue); }

        textarea {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            color: var(--text-input);
            outline: none;
            resize: vertical;
            min-height: 160px;
            line-height: 1.6;
            transition: border 0.2s, background 0.3s, color 0.3s;
        }

        .encode-box textarea:focus { border-color: var(--text-primary); }
        .decode-box textarea:focus { border-color: var(--text-blue); }

        button[type="submit"] {
            margin-top: 12px;
            width: 100%;
            padding: 11px;
            font-size: 11px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
            font-weight: bold;
        }

        button[type="submit"]:hover { opacity: 0.85; }
        .encode-box button[type="submit"] { background: var(--btn-green-bg); color: var(--btn-green-text); }
        .decode-box button[type="submit"] { background: var(--btn-blue-bg); color: var(--btn-blue-text); }

        .result-box {
            margin-top: 20px;
            background: var(--result-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            transition: background 0.3s;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .copy-btn {
            width: auto;
            padding: 4px 10px;
            font-size: 10px;
            letter-spacing: 2px;
            background: var(--hover-bg);
            color: var(--text-nav);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            text-transform: uppercase;
        }

        .copy-btn:hover { color: var(--text-body); border-color: var(--text-muted); }
        .copy-btn.copied { color: var(--text-primary); border-color: var(--text-primary); }

        .value {
            font-size: 15px;
            word-break: break-all;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .encode-box .output-value { color: var(--text-primary); }
        .decode-box .output-value { color: var(--text-blue); }
        .input-value { color: var(--text-value-input); }

        .arrow {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin: 8px 0;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 30px 0 10px;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            margin-top: 30px;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }

            .box {
                padding: 20px;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                padding-top: 48px;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: fixed;
                top: 0; left: 0; right: 0;
                flex-direction: row;
                align-items: center;
                padding: 0 8px;
                border-right: none;
                border-bottom: 1px solid var(--border);
                z-index: 200;
                min-height: 48px;
            }

            .sidebar-top {
                display: flex;
                align-items: center;
                flex-shrink: 0;
            }

            .sidebar-logo {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 6px 10px 6px 0;
                border-bottom: none;
            }

            .sidebar-logo i { font-size: 18px; }
            .logo-img { max-width: 100px; }
            .sidebar-logo h1 { font-size: 12px; margin: 0; }
            .sidebar-logo p { display: none; }

            .sidebar-scroll {
                display: none;
                position: fixed;
                top: 48px;
                left: 0;
                right: 0;
                background: var(--sidebar-bg);
                border-bottom: 1px solid var(--border);
                max-height: 50vh;
                overflow-y: auto;
                padding: 4px 0;
                box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            }

            .sidebar-scroll.open {
                display: block;
            }

            .sidebar-section {
                padding: 10px 16px 2px;
            }

            .sidebar-bottom {
                display: flex;
                align-items: center;
                gap: 2px;
                flex-shrink: 0;
                margin-left: auto;
            }

            .sidebar-nav {
                display: flex;
                border-top: none;
                padding: 0;
                gap: 2px;
            }

            .sidebar-nav a {
                padding: 6px 8px;
                font-size: 10px;
                gap: 4px;
            }

            .sidebar-nav a span { display: none; }

            .theme-toggle {
                width: auto;
                padding: 6px 8px;
                margin: 0;
                gap: 4px;
                font-size: 10px;
            }

            .theme-toggle span { display: none; }

            .menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 32px;
                height: 32px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 16px;
                color: var(--text-nav);
                border: 1px solid var(--theme-btn-border);
                background: var(--theme-btn-bg);
                transition: all 0.2s;
                margin-right: 6px;
            }

            .menu-toggle:hover {
                color: var(--text-body);
                background: var(--hover-bg);
            }

            .main {
                margin-left: 0;
                padding: 16px 12px;
            }

            .box {
                padding: 16px;
            }

            .main-header {
                margin-bottom: 16px;
            }

            .main-header span {
                font-size: 14px;
            }

            textarea {
                min-height: 120px;
                font-size: 13px;
            }
        }

        @media (min-width: 769px) {
            .menu-toggle { display: none; }
        }

        @media (max-width: 480px) {
            .main { padding: 14px 12px; }
            .box { padding: 16px; }
            textarea { min-height: 120px; font-size: 13px; }
            .sidebar-logo h1 { font-size: 12px; }
            .sidebar-logo i { font-size: 18px; }
        }
    </style>
    {% block head_styles %}{% endblock %}
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()" aria-label="Toggle menu">
                <i class="ti ti-menu-2"></i>
            </button>
            <a href="/" style="text-decoration:none;">
                <div class="sidebar-logo">
                    <img src="{{ url_for('static', filename='Images/logo.png') }}" alt="Spark" class="logo-img">
                    <h1>Spark</h1>
                    <p>encode · decode · secure</p>
                </div>
            </a>
        </div>

        <div class="sidebar-scroll" id="sidebarScroll">
            <form method="POST" id="sidebarForm" onsubmit="return false;">
                {% block sidebar_extra %}{% endblock %}
            </form>
        </div>

        <div class="sidebar-bottom">
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">
                <i id="themeIcon" class="ti ti-sun"></i>
                <span id="themeLabel">Light</span>
            </button>
            <nav class="sidebar-nav">
                <a href="/" class="{% if page == 'home' %}active{% endif %}">
                    <i class="ti ti-home"></i><span>Home</span>
                </a>
                <a href="/about" class="{% if page == 'about' %}active{% endif %}">
                    <i class="ti ti-info-circle"></i><span>About</span>
                </a>
            </nav>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        {% block content %}{% endblock %}

        <div class="footer">Spark &mdash; encode &middot; decode &middot; secure</div>
    </main>

    <script>
        function copyText(id, btn) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                btn.innerHTML = '<i class="ti ti-check"></i> Copied';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = '<i class="ti ti-copy"></i> Copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function toggleTheme() {
            var html = document.documentElement;
            var current = html.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('spark-theme', next);
            updateThemeUI(next);
        }

        function updateThemeUI(theme) {
            var icon = document.getElementById('themeIcon');
            var label = document.getElementById('themeLabel');
            if (theme === 'light') {
                icon.className = 'ti ti-moon';
                label.textContent = 'Dark';
            } else {
                icon.className = 'ti ti-sun';
                label.textContent = 'Light';
            }
        }

        function toggleMenu() {
            var scroll = document.getElementById('sidebarScroll');
            scroll.classList.toggle('open');
        }

        // Close mobile menu on link click
        document.addEventListener('DOMContentLoaded', function() {
            var saved = localStorage.getItem('spark-theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
                updateThemeUI(saved);
            }

            document.querySelectorAll('.sidebar-nav a, .technique-btn').forEach(function(el) {
                el.addEventListener('click', function() {
                    document.getElementById('sidebarScroll').classList.remove('open');
                });
            });
        });
    </script>
    {% block scripts %}{% endblock %}

</body>
</html>
